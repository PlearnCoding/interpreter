<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTG Translator Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .recording { animation: pulse 1.5s infinite; border-color: #ef4444; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <header class="flex items-center justify-between py-6">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white">ATTG <span class="text-red-500">TRANSLATOR</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Engineering Edition</p>
            </div>
            <div class="bg-red-600/20 p-2 rounded-lg">
                <i class="fa-solid fa-bolt-lightning text-red-500"></i>
            </div>
        </header>

        <div class="glass p-5 rounded-3xl mb-6 shadow-2xl">
            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">Gemini API Key (Saved)</label>
                <input type="password" id="apiKey" placeholder="กรอก API Key เพื่อบันทึก" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-sm focus:border-red-500 outline-none transition-all text-white">
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">Engine (ระบบการแปล)</label>
                    <select id="engineMode" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-sm outline-none focus:border-red-500 text-white">
                        <option value="gemini">Gemini 2.0 Flash (High Precision - ช้ากว่าแต่แม่น)</option>
                        <option value="gts">GTS Mode (Fast - เน้นไว ใช้ Speech API)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">จาก (From)</label>
                    <select id="srcLang" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-sm outline-none">
                        <option value="zh-CN">จีน (CN)</option>
                        <option value="ja-JP">ญี่ปุ่น (JP)</option>
                        <option value="en-US">อังกฤษ (EN)</option>
                        <option value="th-TH">ไทย (TH)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">เป็น (To)</label>
                    <select id="tgtLang" class="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-sm outline-none">
                        <option value="th-TH" selected>ไทย (TH)</option>
                        <option value="zh-CN">จีน (CN)</option>
                        <option value="ja-JP">ญี่ปุ่น (JP)</option>
                        <option value="en-US">อังกฤษ (EN)</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="displayArea" class="bg-slate-900/50 rounded-3xl p-5 h-[320px] overflow-y-auto mb-6 shadow-inner border border-slate-800 flex flex-col-reverse">
            <div id="output" class="space-y-4">
                <p class="text-slate-500 italic text-center py-10 text-sm">ระบบพร้อมทำงาน...</p>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <button id="recordBtn" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center shadow-2xl hover:bg-red-700 transition-all active:scale-90 mb-3 border-[6px] border-slate-900">
                <i id="micIcon" class="fa-solid fa-microphone text-3xl text-white"></i>
            </button>
            <p id="statusText" class="text-sm font-bold text-slate-400">แตะเพื่อพูด</p>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let recognition;

        const recordBtn = document.getElementById('recordBtn');
        const output = document.getElementById('output');
        const statusText = document.getElementById('statusText');
        const apiKeyInput = document.getElementById('apiKey');
        const engineMode = document.getElementById('engineMode');
        const srcSel = document.getElementById('srcLang');
        const tgtSel = document.getElementById('tgtLang');

        // --- Load API Key from LocalStorage ---
        window.onload = () => {
            const savedKey = localStorage.getItem('attg_gemini_key');
            if (savedKey) apiKeyInput.value = savedKey;
        };

        // --- Save API Key when changed ---
        apiKeyInput.onchange = () => {
            localStorage.setItem('attg_gemini_key', apiKeyInput.value);
        };

        recordBtn.onclick = async () => {
            if (!apiKeyInput.value) { alert('กรุณากรอก API Key'); return; }
            
            if (engineMode.value === 'gts') {
                runGtsMode();
            } else {
                runGeminiMode();
            }
        };

        // --- ENGINE 1: Gemini 2.0 Flash (Direct Audio) ---
        async function runGeminiMode() {
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => translateWithGemini(reader.result.split(',')[1]);
                };
                mediaRecorder.start();
                toggleUI(true, "กำลังฟัง (Gemini 2.0)...");
            } else {
                mediaRecorder.stop();
                toggleUI(false, "กำลังประมวลผล...");
            }
        }

        // --- ENGINE 2: GTS Mode (Speech-to-Text -> Gemini) ---
        function runGtsMode1() {
            if (!isRecording) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { alert("เบราว์เซอร์ไม่รองรับ Speech Recognition"); return; }

                recognition = new SpeechRecognition();
                recognition.lang = srcSel.value;
                recognition.interimResults = false;

                recognition.onstart = () => toggleUI(true, `ฟังภาษา ${srcSel.value}...`);
                recognition.onresult = (event) => {
                    const speechText = event.results[0][0].transcript;
                    addLog("ต้นฉบับ: " + speechText, "bg-slate-800");
                    translateTextOnly(speechText);
                };
                recognition.onerror = (e) => { toggleUI(false, "เกิดข้อผิดพลาด"); console.error(e); };
                recognition.onend = () => toggleUI(false, "แปลเสร็จสิ้น");

                recognition.start();
            }
        }

        // --- ENGINE 2: GTS Mode (Speech-to-Text -> Gemini) ---
        function runGtsMode() {
            if (!isRecording) {
                // ตรวจสอบว่าเบราว์เซอร์รองรับไหม
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { 
                    addLog("❌ เบราว์เซอร์นี้ไม่รองรับ GTS Mode กรุณาเปิดใน Chrome หรือ Safari", "bg-red-900/40");
                    return; 
                }

                recognition = new SpeechRecognition();
                recognition.lang = srcSel.value; // ดึงค่าจากที่เลือก เช่น zh-CN
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    toggleUI(true, `GTS: กำลังฟังภาษา ${srcSel.value}...`);
                    console.log("Recognition started");
                };

                recognition.onresult = (event) => {
                    const speechText = event.results[0][0].transcript;
                    if (speechText) {
                        addLog("ต้นฉบับ: " + speechText, "bg-slate-800 border-l-4 border-blue-500");
                        translateTextOnly(speechText);
                    }
                };

                recognition.onerror = (event) => {
                    let msg = "Error: " + event.error;
                    if (event.error === 'no-speech') msg = "ไม่ได้ยินเสียงพูด กรุณาลองใหม่";
                    if (event.error === 'not-allowed') msg = "คุณยังไม่ได้อนุญาตให้เข้าถึงไมโครโฟน";
                    addLog("⚠️ " + msg, "bg-orange-900/20 text-orange-400");
                    toggleUI(false, "ลองใหม่อีกครั้ง");
                };

                recognition.onend = () => {
                    // ถ้าจบโดยไม่มีผลลัพธ์
                    if (isRecording) {
                        toggleUI(false, "สิ้นสุดการฟัง");
                    }
                };

                try {
                    recognition.start();
                } catch (e) {
                    addLog("Error: " + e.message, "bg-red-900/20");
                }
            } else {
                if (recognition) recognition.stop();
                toggleUI(false, "หยุดฟัง");
            }
        }

        async function translateWithGemini(base64) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${apiKeyInput.value}`;
            const prompt = `Expert Engineer Translator. From ${srcSel.value} to ${tgtSel.value}. Industry: Iron Casting/Machining. Return only translation.`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "audio/webm", data: base64 } }] }] })
                });
                const data = await res.json();
                const result = data.candidates[0].content.parts[0].text;
                addLog(result, "border-l-4 border-red-500 bg-slate-800");
                speak(result);
            } catch (e) { addLog("Error: " + e, "bg-red-900/20"); }
        }

        async function translateTextOnly(text) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${apiKeyInput.value}`;
            const prompt = `Translate this technical text from ${srcSel.value} to ${tgtSel.value}. Context: Casting/Machining. Text: "${text}"`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const result = data.candidates[0].content.parts[0].text;
                addLog(result, "border-l-4 border-green-500 bg-slate-800");
                speak(result);
            } catch (e) { addLog("Error: " + e, "bg-red-900/20"); }
        }

        function toggleUI(recording, text) {
            isRecording = recording;
            statusText.innerText = text;
            if (recording) {
                recordBtn.classList.add('recording');
                document.getElementById('micIcon').classList.replace('fa-microphone', 'fa-stop');
            } else {
                recordBtn.classList.remove('recording');
                document.getElementById('micIcon').classList.replace('fa-stop', 'fa-microphone');
            }
        }

        function addLog(text, classes) {
            if (output.innerText.includes("ระบบพร้อมทำงาน")) output.innerText = "";
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl shadow-lg animate-fade-in ${classes}`;
            div.innerHTML = `<p class="text-white text-sm">${text}</p>`;
            output.prepend(div);
        }

        function speak1(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = tgtSel.value;
            window.speechSynthesis.speak(ut);
        }

        function speak(text) {
            // 1. ตรวจสอบว่าเบราว์เซอร์รองรับการพูดไหม
            if (!window.speechSynthesis) return;

            // 2. ยกเลิกการพูดที่ค้างอยู่ทั้งหมดก่อน (ป้องกันคิวเต็ม)
            window.speechSynthesis.cancel();

            const ut = new SpeechSynthesisUtterance(text);
            
            // 3. ตั้งค่าภาษา
            const targetLang = tgtSel.value; // เช่น th-TH
            ut.lang = targetLang;
            ut.rate = 1.0;  // ความเร็วปกติ
            ut.pitch = 1.0; // ระดับเสียงปกติ
            ut.volume = 1.0; // ดังสุด

            // 4. ทริคพิเศษสำหรับ iOS/Android: ค้นหา Voice ที่ตรงกับภาษา
            const voices = window.speechSynthesis.getVoices();
            const selectedVoice = voices.find(v => v.lang.includes(targetLang));
            if (selectedVoice) {
                ut.voice = selectedVoice;
            }

            // 5. สั่งพูด
            window.speechSynthesis.speak(ut);

            // แก้บั๊ก Chrome/Safari บางเวอร์ชันที่หยุดพูดกลางคัน
            const r = setInterval(() => {
                if (!window.speechSynthesis.speaking) {
                    clearInterval(r);
                } else {
                    window.speechSynthesis.resume();
                }
            }, 5000);
        }

        // เพิ่มบรรทัดนี้เพื่อให้เสียงโหลดเตรียมไว้ตั้งแต่เปิดเว็บ
        window.speechSynthesis.getVoices();

    </script>
</body>
</html>
