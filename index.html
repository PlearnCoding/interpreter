<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTG Real-time Interpreter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        #log-container::-webkit-scrollbar { width: 4px; }
        #log-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-headset text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight uppercase">ATTG Interpreter</h1>
                <p id="engine-status" class="text-[10px] text-slate-500 font-bold uppercase">Ready</p>
            </div>
        </div>
        <button onclick="toggleSettings()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-cog"></i></button>
    </header>

    <div id="settings" class="bg-slate-900 border-b border-slate-800 p-4 space-y-4 hidden shrink-0">
        <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white outline-none">
        <div class="grid grid-cols-2 gap-2">
            <select id="srcLang" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
                <option value="zh-CN">ฟัง: จีน (CN)</option>
                <option value="ja-JP">ฟัง: ญี่ปุ่น (JP)</option>
                <option value="en-US">ฟัง: อังกฤษ (EN)</option>
                <option value="th-TH">ฟัง: ไทย (TH)</option>
            </select>
            <select id="tgtLang" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
                <option value="th-TH">แปลเป็น: ไทย (TH)</option>
                <option value="zh-CN">แปลเป็น: จีน (CN)</option>
                <option value="ja-JP">แปลเป็น: ญี่ปุ่น (JP)</option>
                <option value="en-US">แปลเป็น: อังกฤษ (EN)</option>
            </select>
        </div>
    </div>

    <main id="log-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-slate-900 to-slate-950">
        <div id="logs" class="max-w-xl mx-auto space-y-4">
            </div>
    </main>

    <div id="visualizer" class="h-1 bg-slate-800 shrink-0 overflow-hidden">
        <div id="wave" class="h-full bg-red-600 w-0 transition-all duration-300"></div>
    </div>

    <footer class="p-6 bg-slate-900 border-t border-slate-800 flex justify-center items-center shrink-0">
        <button id="startBtn" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl transition-all active:scale-90 z-10">
            <i id="micIcon" class="fa-solid fa-microphone text-3xl text-white"></i>
        </button>
        <div class="absolute right-10 text-slate-500 text-[10px] font-bold uppercase pointer-events-none">
            <span id="timer">00:00</span>
        </div>
    </footer>

    <script>
        let recognition;
        let isInterpreting = false;
        const apiKeyInput = document.getElementById('apiKey');
        const startBtn = document.getElementById('startBtn');
        const micIcon = document.getElementById('micIcon');
        const logs = document.getElementById('logs');
        const status = document.getElementById('engine-status');
        const srcSel = document.getElementById('srcLang');
        const tgtSel = document.getElementById('tgtLang');

        // Load Saved Key
        window.onload = () => {
            const savedKey = localStorage.getItem('attg_gemini_key');
            if (savedKey) apiKeyInput.value = savedKey;
        };

        apiKeyInput.onchange = () => localStorage.setItem('attg_gemini_key', apiKeyInput.value);

        function toggleSettings() {
            document.getElementById('settings').classList.toggle('hidden');
        }

        // --- Core Interpretation Logic ---
        function startInterpretation() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser ไม่รองรับระบบนี้");

            recognition = new SpeechRecognition();
            recognition.lang = srcSel.value;
            recognition.continuous = true; // ทำงานต่อเนื่อง
            recognition.interimResults = false; // เอาเฉพาะผลลัพธ์ที่มั่นใจแล้ว

            recognition.onstart = () => {
                isInterpreting = true;
                startBtn.classList.add('active-pulse');
                micIcon.className = "fa-solid fa-stop text-3xl text-white";
                status.innerText = "Listening...";
                status.classList.replace('text-slate-500', 'text-red-500');
            };

            recognition.onresult = async (event) => {
                const latestResult = event.results[event.results.length - 1];
                const transcript = latestResult[0].transcript;
                
                if (latestResult.isFinal) {
                    addLog(transcript, 'original');
                    await translateAndSpeak(transcript);
                }
            };

            recognition.onerror = (e) => {
                console.error(e);
                stopInterpretation();
            };

            recognition.onend = () => {
                if (isInterpreting) recognition.start(); // Restart if unexpectedly ended
            };

            recognition.start();
        }

        function stopInterpretation() {
            isInterpreting = false;
            if (recognition) recognition.stop();
            startBtn.classList.remove('active-pulse');
            micIcon.className = "fa-solid fa-microphone text-3xl text-white";
            status.innerText = "Stopped";
            status.classList.replace('text-red-500', 'text-slate-500');
            window.speechSynthesis.cancel();
        }

        startBtn.onclick = () => {
            if (!apiKeyInput.value) return alert("กรุณาใส่ API Key");
            if (!isInterpreting) startInterpretation();
            else stopInterpretation();
        };

        // --- Translation & Speech ---
        async function translateAndSpeak(text) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKeyInput.value}`;
            const prompt = `Expert Engineering Interpreter (Iron Casting/Machining/New Technology/AI Innovation/Smart Factory). Translate from ${srcSel.value} to ${tgtSel.value}. Original: "${text}". Result only.`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const result = data.candidates[0].content.parts[0].text;
                
                addLog(result, 'translated');
                speak(result);
            } catch (e) {
                console.error("Translation failed", e);
            }
        }

        function addLog(text, type) {
            const div = document.createElement('div');
            if (type === 'original') {
                div.className = "bg-slate-800/40 p-3 rounded-xl border border-slate-700 text-xs text-slate-400 w-fit max-w-[80%]";
                div.innerHTML = `<span class="font-bold opacity-50 mr-2 uppercase">${srcSel.value.split('-')[0]}</span> ${text}`;
            } else {
                div.className = "bg-red-600/10 p-4 rounded-2xl border-l-4 border-red-600 text-sm text-white w-fit max-w-[90%] ml-auto shadow-lg animate-fade-in";
                div.innerHTML = `<span class="block text-[10px] font-bold text-red-500 mb-1">TRANSLATED</span> ${text}`;
            }
            logs.appendChild(div);
            document.getElementById('log-container').scrollTo({ top: logs.scrollHeight, behavior: 'smooth' });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = tgtSel.value;
            ut.rate = 1.1; // เร่งความเร็วเล็กน้อยให้ทันเหตุการณ์
            window.speechSynthesis.speak(ut);
        }
    </script>
</body>
</html>
